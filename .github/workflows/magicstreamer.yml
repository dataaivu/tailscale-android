name: Build Magic-Streamer APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Inject MagicStreamer auth key
        run: sed -i "s|__MS_AUTHKEY__|${{ secrets.MS_AUTHKEY }}|g" android/src/main/java/com/tailscale/ipn/mdm/MDMSettings.kt

      - name: Install branding tools
        run: sudo apt-get install -y librsvg2-bin webp

      - name: Generate launcher icons (SVG → webp at all densities)
        run: |
          ICON=android/src/main/branding/ppn-icon.svg
          # mdpi 48x48
          rsvg-convert -w 48 -h 48 "$ICON" -o /tmp/icon.png
          cwebp -lossless /tmp/icon.png -o android/src/main/res/mipmap-mdpi/ic_launcher.webp
          cwebp -lossless /tmp/icon.png -o android/src/main/res/mipmap-mdpi/ic_launcher_round.webp
          # hdpi 72x72
          rsvg-convert -w 72 -h 72 "$ICON" -o /tmp/icon.png
          cwebp -lossless /tmp/icon.png -o android/src/main/res/mipmap-hdpi/ic_launcher.webp
          cwebp -lossless /tmp/icon.png -o android/src/main/res/mipmap-hdpi/ic_launcher_round.webp
          # xhdpi 96x96
          rsvg-convert -w 96 -h 96 "$ICON" -o /tmp/icon.png
          cwebp -lossless /tmp/icon.png -o android/src/main/res/mipmap-xhdpi/ic_launcher.webp
          cwebp -lossless /tmp/icon.png -o android/src/main/res/mipmap-xhdpi/ic_launcher_round.webp
          # xxhdpi 144x144
          rsvg-convert -w 144 -h 144 "$ICON" -o /tmp/icon.png
          cwebp -lossless /tmp/icon.png -o android/src/main/res/mipmap-xxhdpi/ic_launcher.webp
          cwebp -lossless /tmp/icon.png -o android/src/main/res/mipmap-xxhdpi/ic_launcher_round.webp
          # xxxhdpi 192x192
          rsvg-convert -w 192 -h 192 "$ICON" -o /tmp/icon.png
          cwebp -lossless /tmp/icon.png -o android/src/main/res/mipmap-xxxhdpi/ic_launcher.webp
          cwebp -lossless /tmp/icon.png -o android/src/main/res/mipmap-xxxhdpi/ic_launcher_round.webp

      - name: Generate TV banner (4K — drawable-nodpi)
        run: |
          mkdir -p android/src/main/res/drawable-nodpi
          # 3840x2160 — rendered from vector, pixel-perfect on 4K Fire TV.
          # drawable-nodpi tells Android to use this image as-is, no scaling.
          rsvg-convert -w 3840 -h 2160 \
            android/src/main/branding/ppn-tv-banner.svg \
            -o android/src/main/res/drawable-nodpi/tv_banner.png
          # Keep the legacy xhdpi fallback (320x180) for older/SD devices
          rsvg-convert -w 320 -h 180 \
            android/src/main/branding/ppn-tv-banner.svg \
            -o android/src/main/res/drawable-xhdpi/tv_banner.png

      - name: Build universal debug APK
        run: make tailscale-debug.apk
      - name: Rename
        run: cp tailscale-debug.apk Magic-Streamer.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Magic-Streamer-APK
          path: Magic-Streamer.apk
          if-no-files-found: error
      - name: Notify build complete
        if: always()
        run: |
          curl -s \
            -H "Title: MagicStreamer build ${{ job.status }}" \
            -H "Tags: ${{ job.status }}" \
            -d "run=${{ github.run_id }} status=${{ job.status }} url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            https://ntfy.sh/magicstreamer-ci-7h3k9x